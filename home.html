<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Flexi Educational Consult</title>
    <style>
        :root {
            --primary-bg: #f4f7f9;
            --text-dark: #1a2a6c;
            --accent-purple: #6a11cb;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .logo {
            width: 65px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--text-dark);
            font-size: 1.4rem;
            margin: 0;
            font-weight: 800;
        }

        /* Center Info Badge */
        #centerBadge {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: white;
            border: 2px solid var(--accent-purple);
            color: var(--accent-purple);
            border-radius: 25px; /* Consistent curved style */
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 2-Column Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            margin-top: 25px;
        }

        .card {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            border-radius: 28px; /* High-curvature design */
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: 0.2s ease;
        }

        .card:active {
            transform: scale(0.92);
            opacity: 0.9;
        }

        /* Gradient Palette */
        .c1 { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); }
        .c2 { background: linear-gradient(135deg, #483d8b 0%, #6a5acd 100%); }
        .c3 { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        .c4 { background: linear-gradient(135deg, #7028e4 0%, #e5b2ca 100%); }
        .c5 { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
        .c6 { background: linear-gradient(135deg, #5f72bd 0%, #9b23ea 100%); }
        .c7 { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); }
        .c8 { background: linear-gradient(135deg, #373b44 0%, #4286f4 100%); }

        .logout-section {
            margin-top: 40px;
            width: 100%;
            text-align: center;
        }

        #logoutBtn {
            background: #fff;
            border: 1px solid #d63031;
            color: #d63031;
            padding: 8px 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        #logoutBtn:hover { background: #feebeb; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/0Qm3PLw5/1771700279759-2.jpg" alt="Flexi Logo" class="logo">
        <h1>Flexi Admin Dashboard</h1>
        <div id="centerBadge">Authenticating Center...</div>
    </header>

    <main class="dashboard-grid">
        <a href="adminCBT.html" class="card c1">Manage Online CBT</a>
        <a href="adminexpo.html" class="card c2">Upload Expo</a>
        <a href="adminlocation.html" class="card c3">Manage Locations</a>
        <a href="videos.html" class="card c4">upload YouTube Videos</a>
       <a href="announcement.html" class="card c4">Publish system announcement</a>
        <a href="adminpurchase.html" class="card c5">update Cart</a>
        <a href="newsupload.html" class="card c6">Enter Current News Update</a>
       <a href="pdf.html" class="card c6">Upload PDFs</a>
        <a href="admincenter.html" class="card c7">My Center Hub</a>
        <a href="CBTupdates.html" class="card c7">Check Center CBT updates</a>
        <a href="staff.html" class="card c8">Tutor Employment</a>
        <a href="quote.html" class="card c8">Enter Daily Motivational Quotes</a>
    </main>

    <div class="logout-section">
        <button id="logoutBtn">Logout System</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
            authDomain: "waec2026jamb2027.firebaseapp.com",
            databaseURL: "https://waec2026jamb2027-default-rtdb.firebaseio.com",
            projectId: "waec2026jamb2027",
            storageBucket: "waec2026jamb2027.firebasestorage.app",
            messagingSenderId: "465373608641",
            appId: "1:465373608641:web:03d21cead99a3c9b65f240",
            measurementId: "G-XD6YTGGC30"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Security check and dynamic UI update
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Kick out unauthorized access
                window.location.href = "index.html";
            } else {
                // Fetch details from LocalStorage (set during index.html login)
                const centerName = localStorage.getItem('centerName') || "Authorized Center";
                const centerID = localStorage.getItem('centerID') || "ID-000";
                document.getElementById('centerBadge').innerText = `${centerName} [${centerID}]`;
            }
        });

        // Logout logic
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if(confirm("Are you sure you want to logout?")) {
                signOut(auth).then(() => {
                    localStorage.clear();
                    window.location.href = "index.html";
                });
            }
        });
    </script>
</body>
</html>
