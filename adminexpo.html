<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexi Admin | Content Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root { 
    --blue: #003366; 
    --green: #2E8B57; 
    --bg: #f0f2f5;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 20px;
}

.admin-container { max-width: 600px; margin: 0 auto; }
.card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }

h2, h3 { color: var(--blue); margin-top: 0; }
label { display: block; font-size: 0.85rem; font-weight: 600; margin-top: 15px; color: #4a5568; }

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    box-sizing: border-box;
    font-family: inherit;
    font-size: 0.95rem;
}

textarea {
    white-space: pre-wrap;
    line-height: 1.5;
}

input:focus, textarea:focus {
    border-color: var(--blue);
    outline: none;
}

.btn {
    background: var(--blue);
    color: white;
    border: none;
    padding: 15px 25px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
    width: 100%;
    transition: opacity 0.2s;
}

.btn-green { background: var(--green); }

.ans-item { 
    border-bottom: 2px solid #edf2f7; 
    padding: 20px 0; 
}

.ans-label { 
    font-weight: 800; 
    color: var(--blue); 
    margin-bottom: 15px;
    font-size: 1.1rem;
}

.ans-box {
    background: #f8fafc;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
}

.loading { opacity: 0.5; pointer-events: none; }
</style>
</head>

<body>

<div class="admin-container">
    <h2>🚀 Flexi Content Manager</h2>

    <div class="card">
        <h3>🔑 Step 1: Manage PIN</h3>
        <label>Select Subject</label>
        <select id="pin-subject" class="sub-list"></select>
        
        <label>4-Digit Access PIN</label>
        <input type="text" id="pin-code" maxlength="4" placeholder="e.g. 1234">
        
        <button class="btn" onclick="savePin()">Save Access PIN</button>
    </div>

    <div class="card">
        <h3>📸 Step 2: Upload Questions</h3>
        <label>Select Subject</label>
        <select id="q-subject" class="sub-list"></select>
        
        <label>Question Images (Select Multiple)</label>
        <input type="file" id="q-files" multiple>
        
        <button class="btn btn-green" onclick="uploadQuestions()">Upload Questions</button>
    </div>

    <!-- NEW OBJECTIVE SECTION -->
    <div class="card">
        <h3>🎯 Step 1.5: Objective Answers</h3>
        <label>Select Subject</label>
        <select id="obj-subject" class="sub-list"></select>
        
        <label>Upload Type</label>
        <select id="obj-type" onchange="toggleObjInput()">
            <option value="text">Text / Keys</option>
            <option value="image">Image Upload</option>
        </select>

        <div id="obj-text-input" style="margin-top:15px;">
            <label>Objective Text (e.g. 1.A, 2.B...)</label>
            <textarea id="obj-text" placeholder="Type or paste objective keys here..." rows="4"></textarea>
        </div>

        <div id="obj-image-input" style="margin-top:15px; display:none;">
            <label>Objective Image</label>
            <input type="file" id="obj-file" accept="image/*">
        </div>
        
        <button class="btn btn-green" onclick="saveObjectives()">Save Objective Data</button>
    </div>
    
    <div class="card">
        <h3>📝 Step 3: Detailed Answers (1-20)</h3>
        <label>Select Subject</label>
        <select id="a-subject" class="sub-list"></select>

        <div id="answers-container"></div>

        <button class="btn" id="bulk-save-btn" onclick="saveAllAnswers()">Save All Answer Data</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
    projectId: "waec2026jamb2027"
});
const db = getFirestore(app);

const subjects = [
    "Account","Agricultural Science","Animal Husbandry","Arabic","Biology",
    "Catering Craft Practice","Chemistry","Christian Religious Studies (CRS)",
    "Book Keeping","Civic Education","Commerce","Computer Studies",
    "Data Processing","Economics","Fine Arts","Food and Nutrition","French",
    "Further Mathematics","Geography","Government","Hausa","History",
    "Home Economics","Igbo","Insurance","Home Management",
    "Islamic Religious Knowledge (IRK)","Literature In English","Marketing",
    "Mathematics","Music","Office Practice","Physical Education","Physics",
    "Technical Drawing","Yoruba"
];

const CLOUD_NAME = "dwmbgd9jy";
const UPLOAD_PRESET = "my_preset_123";

// Populate Dropdowns
document.querySelectorAll('.sub-list').forEach(select => {
    subjects.sort().forEach(s => {
        let opt = new Option(s, s);
        select.add(opt);
    });
});

// Generate Answer Blocks 1-20
const container = document.getElementById('answers-container');
for(let i=1; i<=20; i++){
    const div = document.createElement('div');
    div.className = "ans-item";
    div.innerHTML = `
        <div class="ans-label">NUMBER ${i}</div>
        <div class="ans-box">
            <label>Text Answer (Spacing/Paragraphs preserved)</label>
            <textarea id="text-${i}" placeholder="Paste/Type answer for number ${i}..." rows="5"></textarea>
            
            <label style="margin-top:20px;">Image Answer</label>
            <input type="file" id="file-${i}" accept="image/*">
        </div>
    `;
    container.appendChild(div);
}

// Cloudinary Helper
async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { 
        method: "POST", 
        body: formData 
    });
    const data = await res.json();
    return data.secure_url;
}

// Save PIN
window.savePin = async () => {
    const sub = document.getElementById('pin-subject').value;
    const pin = document.getElementById('pin-code').value;
    if(pin.length !== 4) return alert("PIN must be 4 digits");
    
    await setDoc(doc(db, "expo_pins", sub), { subject: sub, pinCode: pin });
    alert("✅ PIN Saved for " + sub);
};

// Toggle Objective Input
window.toggleObjInput = () => {
    const type = document.getElementById('obj-type').value;
    document.getElementById('obj-text-input').style.display = type === 'text' ? 'block' : 'none';
    document.getElementById('obj-image-input').style.display = type === 'image' ? 'block' : 'none';
};

// Save Objective
window.saveObjectives = async () => {
    const sub = document.getElementById('obj-subject').value;
    const type = document.getElementById('obj-type').value;
    const btn = event.target;
    
    btn.innerText = "Saving Objectives...";
    btn.classList.add('loading');

    let objData = {};

    try {
        if (type === 'text') {
            const textVal = document.getElementById('obj-text').value;
            if (!textVal.trim()) throw new Error("Please enter objective text");
            objData = { objectiveText: textVal, objectiveImg: null };
        } else {
            const file = document.getElementById('obj-file').files[0];
            if (!file) throw new Error("Please select an objective image");
            const url = await uploadToCloudinary(file);
            objData = { objectiveImg: url, objectiveText: null };
        }

        await setDoc(doc(db, "expo_data", sub), objData, { merge: true });
        alert("✅ Objectives Saved for " + sub);
    } catch (e) {
        alert(e.message || "Failed to save objectives.");
    } finally {
        btn.innerText = "Save Objective Data";
        btn.classList.remove('loading');
    }
};

// Upload Questions
window.uploadQuestions = async () => {
    const sub = document.getElementById('q-subject').value;
    const files = document.getElementById('q-files').files;
    if(files.length === 0) return alert("Select images first");

    const btn = event.target;
    btn.innerText = "Uploading Questions...";
    btn.classList.add('loading');

    try {
        let urls = [];
        for(let f of files) urls.push(await uploadToCloudinary(f));
        await setDoc(doc(db, "expo_data", sub), { questionImages: urls }, { merge: true });
        alert("✅ Questions Uploaded");
    } catch (e) {
        alert("Upload failed.");
    } finally {
        btn.innerText = "Upload Questions";
        btn.classList.remove('loading');
    }
};

// Save All Answer Data
window.saveAllAnswers = async () => {
    const sub = document.getElementById('a-subject').value;
    const btn = document.getElementById('bulk-save-btn');
    
    btn.innerText = "Preserving Spacing & Syncing...";
    btn.classList.add('loading');

    let updateObj = {};

    try {
        for(let i=1; i<=20; i++) {
            const textVal = document.getElementById(`text-${i}`).value;
            const fileInput = document.getElementById(`file-${i}`).files[0];

            if(textVal.trim()) {
                updateObj[`ans${i}`] = textVal;
            }
            
            if(fileInput) {
                const uploadedUrl = await uploadToCloudinary(fileInput);
                updateObj[`ansImg${i}`] = uploadedUrl;
            }
        }

        if(Object.keys(updateObj).length === 0) {
            alert("No data entered to save.");
        } else {
            await setDoc(doc(db, "expo_data", sub), updateObj, { merge: true });
            alert("✅ All Answers Saved for " + sub + " (Spacing preserved)");
        }
    } catch (e) {
        alert("Error saving data.");
        console.error(e);
    } finally {
        btn.innerText = "Save All Answer Data";
        btn.classList.remove('loading');
    }
};
</script>

</body>
</html>
